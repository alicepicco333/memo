<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Meme Ontology — Documentation</title>
  <style>
  :root {
    --bg:#f7f7f5; --surface:#fff; --border:#e0e0dc; --text:#111;
    --muted:#666; --accent:#1a1a1a; --accent2:#1a3d6b;
    --nav-w:270px; --prop:#2e6b3e; --cls:#1a3d6b; --ind:#7b3b00;
    font-size:14px;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body { font-family:'Segoe UI',system-ui,sans-serif; color:var(--text);
         background:var(--bg); line-height:1.7; margin:0; padding:0; }

  .lode-container {
    width:100%;
    height:100vh;
    overflow:hidden;
    position:relative;
  }

  .lode-container iframe {
    width:100%;
    height:100%;
    border:none;
    display:block;
  }

  .lode-loading {
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    background:var(--bg);
    color:var(--muted);
    font-size:0.9rem;
  }

  .lode-error {
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    background:var(--bg);
    padding:40px;
    text-align:center;
  }

  .lode-error h2 {
    color:var(--accent);
    margin-bottom:12px;
  }

  .lode-error p {
    color:var(--muted);
    margin-bottom:16px;
  }

  .lode-error a {
    color:var(--accent2);
    text-decoration:none;
    border-bottom:1px solid var(--accent2);
  }

  .lode-error a:hover {
    text-decoration:underline;
  }
  </style>
</head>
<body>

  <div class="lode-container" id="lode-container">
    <div class="lode-loading">Loading ontology documentation…</div>
  </div>

  <script>
  // LODE endpoint URL for the meme ontology
  const lodeUrl = 'http://150.146.207.114/lode/extract?url=https%3A%2F%2Fraw.githubusercontent.com%2Falicepicco333%2Fmemo%2Frefs%2Fheads%2Fmain%2Fmeme_ontology_unpopulated.owl&owlapi=true&imported=true&closure=true&reasoner=true&lang=en';

  const container = document.getElementById('lode-container');

  // Create iframe
  const iframe = document.createElement('iframe');
  iframe.src = lodeUrl;
  iframe.title = 'The Meme Ontology — LODE Documentation';

  // Handle iframe load and errors
  iframe.onload = function() {
    // Remove loading message
    container.innerHTML = '';
    container.appendChild(iframe);
  };

  iframe.onerror = function() {
    container.innerHTML = `
      <div class="lode-error">
        <div>
          <h2>Documentation Loading Issue</h2>
          <p>The LODE documentation endpoint is temporarily unavailable.</p>
          <p><a href="https://service.tib.eu/webvowl/" target="_blank">Open WebVOWL Visualization</a> or download the OWL file to view documentation.</p>
        </div>
      </div>
    `;
  };

  // Start loading
  container.appendChild(iframe);
  </script>

</body>
</html>
