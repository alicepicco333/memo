<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Meme Ontology</title>
  <link rel="stylesheet" href="meme_viz.css"/>
</head>
<body class="home-page">
  <nav class="topnav" id="topnav">
    <a class="topnav-brand" href="index.html">The Meme Ontology</a>
    <div class="topnav-links">
      <a class="topnav-link active" href="index.html">Home</a>
      <a class="topnav-link" href="visualizations.html">Visualizations</a>
      <a class="topnav-link" href="visualizations.html#about">About</a>
      <a class="topnav-link" href="visualizations.html#dataset">Dataset</a>
      <a class="topnav-link" href="visualizations.html#ontology">Ontology</a>
      <a class="topnav-link" href="sparql.html" target="_blank" rel="noopener">SPARQL</a>
    </div>
  </nav>

  <main class="home-main">
    <section class="viz-section hero-section home-hero" id="sec-hero">
      <div id="hero-images" class="hero-images"></div>
      <div id="hero-collage-sentinel" class="home-collage-sentinel"></div>
      <div class="hero-content">
        <h1 class="hero-title">THE MEME ONTOLOGY</h1>
      </div>
    </section>

  </main>

  <script>
    (function() {
      var heroContainer = document.getElementById('hero-images');
      var sentinel = document.getElementById('hero-collage-sentinel');
      var queue = [];
      var cursor = 0;
      var BATCH = 120;
      var isLoading = false;
      var exhausted = false;

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = a[i];
          a[i] = a[j];
          a[j] = tmp;
        }
        return a;
      }

      function tileSizeClass() {
        return 'home-tile';
      }

      function appendBatch() {
        if (isLoading || exhausted) return;
        isLoading = true;

        var limit = Math.min(cursor + BATCH, queue.length);
        for (var i = cursor; i < limit; i++) {
          var item = queue[i];
          var a = document.createElement('a');
          a.className = tileSizeClass(i);
          a.href = 'visualizations.html#meme/' + encodeURIComponent(item.slug);
          a.title = item.slug.replace(/_/g, ' ');

          var img = document.createElement('img');
          img.src = item.imageURL || ('images_flat/' + item.imageFilename);
          img.alt = item.slug;
          img.loading = 'lazy';

          if (item.imageURL && item.imageFilename) {
            img.addEventListener('error', function() {
              if (this.dataset.fallbackTried) return;
              this.dataset.fallbackTried = '1';
              this.src = 'images_flat/' + this.dataset.fallbackFilename;
            });
            img.dataset.fallbackFilename = item.imageFilename;
          }

          a.appendChild(img);
          heroContainer.appendChild(a);
        }

        cursor = limit;
        if (cursor >= queue.length) exhausted = true;
        isLoading = false;
      }

      function boot(data) {
        var memes = data && data.memes ? data.memes : {};
        var slugs = Object.keys(memes);
        var shuffledQueue = shuffle(slugs)
          .map(function(slug) {
            return {
              slug: slug,
              imageFilename: memes[slug] && memes[slug].imageFilename,
              imageURL: memes[slug] && memes[slug].imageURL
            };
          })
          .filter(function(m) { return !!m.imageFilename; });

        queue = shuffledQueue;

        appendBatch();
        appendBatch();

        var obs = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              appendBatch();
              if (exhausted) obs.disconnect();
            }
          });
        }, { rootMargin: '1100px 0px 1100px 0px' });
        obs.observe(sentinel);
      }

      fetch('meme_data.json', { cache: 'no-store' })
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(boot)
        .catch(function() {
          heroContainer.innerHTML = '<p style="grid-column:1 / -1; color:#666; font-size:.85rem; padding: 20px;">Unable to load collage data.</p>';
        });
    })();
  </script>
</body>
</html>
