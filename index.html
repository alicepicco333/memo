<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Meme Ontology</title>
  <link rel="stylesheet" href="meme_viz.css"/>
</head>
<body class="home-page">
  <nav class="topnav" id="topnav">
    <a class="topnav-brand" href="index.html">The Meme Ontology</a>
    <div class="topnav-links">
      <a class="topnav-link active" href="index.html">Home</a>
      <a class="topnav-link" href="visualizations.html">Visualizations</a>
      <a class="topnav-link" href="visualizations.html#about">About</a>
      <a class="topnav-link" href="visualizations.html#dataset">Dataset</a>
      <a class="topnav-link" href="visualizations.html#ontology">Ontology</a>
      <a class="topnav-link" href="sparql.html" target="_blank" rel="noopener">SPARQL</a>
    </div>
  </nav>

  <main class="home-main">
    <section class="viz-section hero-section home-hero" id="sec-hero">
      <div id="hero-images" class="hero-images"></div>
      <div id="hero-collage-sentinel" class="home-collage-sentinel"></div>
      <div class="hero-content">
        <h1 class="hero-title"><span>THE MEME</span><span>ONTOLOGY</span></h1>
      </div>
    </section>

  </main>

  <script>
    (function() {
      var heroContainer = document.getElementById('hero-images');
      var sentinel = document.getElementById('hero-collage-sentinel');
      var desktopHover = window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches;
      var turtleTip = null;
      var mousePos = { x: 0, y: 0 };
      var hasMousePos = false;
      var currentTile = null;
      var queue = [];
      var cursor = 0;
      var BATCH = 120;
      var isLoading = false;
      var exhausted = false;

      function toMemoLocal(str) {
        return String(str || '')
          .toLowerCase()
          .replace(/[^a-z0-9_-]+/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-+|-+$/g, '') || 'memo_entry';
      }

      function shortText(str, maxLen) {
        var s = String(str || '').replace(/\s+/g, ' ').trim();
        if (s.length <= maxLen) return s;
        return s.slice(0, Math.max(0, maxLen - 1)) + '…';
      }

      function buildMemeSnippet(item) {
        var local = toMemoLocal(item.memoLocal || item.slug);
        var label = shortText(item.label || item.slug || 'Meme', 60);
        return [
          'memo:' + local + ' a owl:NamedIndividual, memo:MemeConcept ;',
          '  rdfs:label "' + label.replace(/"/g, '\\"') + '" .'
        ].join('\n');
      }

      function buildVariantSnippet(item) {
        var local = toMemoLocal(item.memoLocal || ('variant_' + (item.photoId || 'x')));
        var parent = toMemoLocal(item.parentLocal || item.slug || 'meme');
        var title = shortText(item.label || item.slug || 'Variant', 52);
        return [
          'memo:' + local + ' a owl:NamedIndividual, memo:VariantInstance ;',
          '  memo:variantTitle "' + title.replace(/"/g, '\\"') + '" ;',
          '  wdp:P361 memo:' + parent + ' .'
        ].join('\n');
      }

      function ensureTooltip() {
        if (!desktopHover || turtleTip) return;
        turtleTip = document.createElement('div');
        turtleTip.className = 'home-ttl-tooltip';
        document.body.appendChild(turtleTip);
      }

      function showTooltip(text, e) {
        if (!desktopHover) return;
        ensureTooltip();
        if (!turtleTip) return;
        turtleTip.textContent = text;
        turtleTip.style.display = 'block';
        moveTooltip(e || { clientX: mousePos.x, clientY: mousePos.y });
      }

      function moveTooltip(e) {
        if (!desktopHover || !turtleTip || turtleTip.style.display !== 'block') return;
        var pad = 12;
        var x = e.clientX + 16;
        var y = e.clientY + 16;
        var maxX = window.innerWidth - turtleTip.offsetWidth - pad;
        var maxY = window.innerHeight - turtleTip.offsetHeight - pad;
        turtleTip.style.left = Math.max(pad, Math.min(x, maxX)) + 'px';
        turtleTip.style.top = Math.max(pad, Math.min(y, maxY)) + 'px';
      }

      function hideTooltip() {
        if (turtleTip) turtleTip.style.display = 'none';
      }

      function refreshHoverAtMouse() {
        if (!desktopHover) return;
        if (!hasMousePos) return;

        moveTooltip({ clientX: mousePos.x, clientY: mousePos.y });

        var node = document.elementFromPoint(mousePos.x, mousePos.y);
        var tile = node ? node.closest('.home-tile') : null;

        if (!tile || !heroContainer.contains(tile)) {
          currentTile = null;
          hideTooltip();
          return;
        }

        if (currentTile !== tile) {
          currentTile = tile;
          showTooltip(tile.dataset.ttlSnippet || '', { clientX: mousePos.x, clientY: mousePos.y });
          return;
        }

        // Same tile, keep tooltip content in sync in case data changed during lazy append.
        if (turtleTip && turtleTip.style.display === 'block') {
          var nextText = tile.dataset.ttlSnippet || '';
          if (turtleTip.textContent !== nextText) {
            turtleTip.textContent = nextText;
          }
        }
      }

      function updateHoverFromPointer(e) {
        if (!desktopHover) return;
        mousePos.x = e.clientX;
        mousePos.y = e.clientY;
        hasMousePos = true;
        refreshHoverAtMouse();
      }

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = a[i];
          a[i] = a[j];
          a[j] = tmp;
        }
        return a;
      }

      function tileSizeClass() {
        return 'home-tile';
      }

      function appendBatch() {
        if (isLoading || exhausted) return;
        isLoading = true;

        var limit = Math.min(cursor + BATCH, queue.length);
        for (var i = cursor; i < limit; i++) {
          var item = queue[i];
          var a = document.createElement('a');
          a.className = tileSizeClass(i);
          if (item.type === 'variant') {
            a.href = 'visualizations.html#variant/' + encodeURIComponent(item.photoId || item.slug || '');
          } else {
            a.href = 'visualizations.html#meme/' + encodeURIComponent(item.slug);
          }

          var img = document.createElement('img');
          img.src = item.imageURL || ('images_flat/' + item.imageFilename);
          img.alt = item.label || item.slug || '';
          img.loading = 'lazy';

          if (item.imageURL && item.imageFilename) {
            img.addEventListener('error', function() {
              if (this.dataset.fallbackTried) return;
              this.dataset.fallbackTried = '1';
              this.src = 'images_flat/' + this.dataset.fallbackFilename;
            });
            img.dataset.fallbackFilename = item.imageFilename;
          }

          if (desktopHover) {
            var snippet = item.type === 'variant'
              ? buildVariantSnippet(item)
              : buildMemeSnippet(item);
            a.dataset.ttlSnippet = snippet;
          }

          a.appendChild(img);
          heroContainer.appendChild(a);
        }

        cursor = limit;
        if (cursor >= queue.length) exhausted = true;
        isLoading = false;
      }

      function buildQueue(memeData, variantData) {
        var memes = memeData && memeData.memes ? memeData.memes : {};
        var slugs = Object.keys(memes);
        var memeEntries = slugs
          .map(function(slug) {
            var m = memes[slug] || {};
            return {
              type: 'meme',
              slug: slug,
              label: slug.replace(/[-_]+/g, ' '),
              memoLocal: slug,
              imageFilename: m.imageFilename,
              imageURL: m.imageURL
            };
          })
          .filter(function(m) { return !!m.imageFilename; });

        var variants = Array.isArray(variantData) ? variantData : [];
        var variantEntries = variants
          .map(function(v) {
            return {
              type: 'variant',
              slug: v.folder || toMemoLocal(v.meme_name),
              photoId: v.photo_id,
              label: v.title || v.meme_name || ('Variant ' + (v.photo_id || '')),
              memoLocal: 'variant_' + (v.photo_id || ''),
              parentLocal: v.folder || toMemoLocal(v.meme_name),
              imageFilename: null,
              imageURL: v.image_url || ''
            };
          })
          .filter(function(v) { return !!v.imageURL; });

        return shuffle(memeEntries.concat(variantEntries));
      }

      function boot(allData) {
        var memeData = allData && allData[0] ? allData[0] : {};
        var variantData = allData && allData[1] ? allData[1] : [];
        var shuffledQueue = buildQueue(memeData, variantData);

        queue = shuffledQueue;

        appendBatch();
        appendBatch();

        var obs = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              appendBatch();
              if (exhausted) obs.disconnect();
            }
          });
        }, { rootMargin: '1100px 0px 1100px 0px' });
        obs.observe(sentinel);
      }

      Promise.all([
        fetch('meme_data.json', { cache: 'no-store' }).then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' for meme_data.json');
          return r.json();
        }),
        fetch('variants_metadata.json', { cache: 'no-store' })
          .then(function(r) {
            if (!r.ok) return [];
            return r.json();
          })
          .catch(function() { return []; })
      ])
        .then(boot)
        .catch(function() {
          heroContainer.innerHTML = '<p style="grid-column:1 / -1; color:#666; font-size:.85rem; padding: 20px;">Unable to load collage data.</p>';
        });

      if (desktopHover) {
        document.addEventListener('mousemove', updateHoverFromPointer);
        window.addEventListener('scroll', refreshHoverAtMouse, { passive: true });
        window.addEventListener('resize', refreshHoverAtMouse, { passive: true });
        document.addEventListener('mouseleave', function() {
          currentTile = null;
          hasMousePos = false;
          hideTooltip();
        });
        window.addEventListener('blur', function() {
          currentTile = null;
          hasMousePos = false;
          hideTooltip();
        });
      }
    })();
  </script>
</body>
</html>
